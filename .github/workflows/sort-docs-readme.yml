name: Sort Docs README List

on:
  push:
    paths:
      - 'docs/**.md'
  pull_request:
    paths:
      - 'docs/**.md'

permissions:
  contents: write

jobs:
  sort-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Sort docs list
        run: |
          python -c '
          import os
          import glob
          import re
          
          docs_dir = "docs"
          readme_path = os.path.join(docs_dir, "README.md")
          template_path = os.path.join(docs_dir, "README-TEMPLATE.md")
          
          # Read template
          with open(template_path, "r", encoding="utf-8") as f:
              template_content = f.read()
              
          lines = []
          for md_file in glob.glob(os.path.join(docs_dir, "*.md")):
              filename = os.path.basename(md_file)
              if filename in ["README.md", "README-TEMPLATE.md"]:
                  continue
                  
              # Extract title or fallback
              title = "설명 없음"
              with open(md_file, "r", encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if line.startswith("# "):
                          title = line[2:].strip()
                          break
              
              lines.append(f"- [{filename}](./{filename}): {title}")
              
          lines.sort(key=lambda x: x.lower())
          
          header = "# 프로젝트 운영 지침 및 개발 가이드\n\n### 문서 목록\n\n"
          
          new_content = header + "\n".join(lines) + "\n\n" + template_content
          
          with open(readme_path, "w", encoding="utf-8") as f:
              f.write(new_content)
          '

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(readme): auto-sort docs list"
          file_pattern: 'docs/README.md'
